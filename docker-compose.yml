# docker-compose.yml — dùng cho Portainer Stack
#
# Cách 1 (BUILD trên server — mặc định, đang bật):
#   Để nguyên block `build:` bên dưới. Portainer sẽ build image trực tiếp
#   trên server từ source (Repository deploy / SCP / Web editor đều OK).
#   QUAN TRỌNG: không khai báo `image:` ở top-level! Nếu khai báo và image
#   không tồn tại trên registry, Portainer chạy `docker compose pull` trước
#   khi build sẽ báo:
#       "pull access denied for pharmacy-ai, repository does not exist"
#   Dùng `build.tags` để vẫn gắn tag `pharmacy-ai:latest` sau khi build mà
#   không trigger pull.
#
# Cách 2 (PULL từ registry — khi đã đẩy image lên Docker Hub / GHCR):
#   Comment toàn bộ block `build:` và bỏ comment dòng `image: ghcr.io/...`.

services:
  pharmacy-ai:
    container_name: pharmacy-ai
    build:
      context: .
      dockerfile: Dockerfile
      tags:
        - pharmacy-ai:latest
    # image: ghcr.io/<your-org>/pharmacy-ai:latest   # nếu kéo từ registry
    restart: unless-stopped
    ports:
      # Host:Container — truy cập FE qua http://<server-ip>:8040
      - "8040:3000"
    environment:
      NODE_ENV: production
      # Bỏ trống → NPC dùng stub rule-based; có key → dùng OpenAI thật.
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/api/health"]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3
    # Tuỳ chọn: gắn vào network của reverse-proxy (Traefik / Caddy) nếu có.
    # networks:
    #   - web
    labels:
      # Ví dụ label cho Traefik (bỏ comment nếu dùng):
      # - "traefik.enable=true"
      # - "traefik.http.routers.pharmacy.rule=Host(`pharmacy.example.com`)"
      # - "traefik.http.routers.pharmacy.entrypoints=websecure"
      # - "traefik.http.routers.pharmacy.tls.certresolver=le"
      # - "traefik.http.services.pharmacy.loadbalancer.server.port=3000"
      app: pharmacy-ai

# networks:
#   web:
#     external: true
